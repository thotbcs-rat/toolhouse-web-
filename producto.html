<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolhouse - Producto</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="logo">TOOLHOUSE</div>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="producto-detalle">
      <h1 id="nombre"></h1>
      <p><strong>Precio de renta:</strong> <span id="precio"></span></p>
      <p><strong>Disponibilidad:</strong> <span id="stock"></span></p>
      <p><strong>Seguro adicional:</strong> $200</p>

      <div class="galeria">
        <img id="imagen" src="" alt="Imagen del producto">
      </div>

      <div class="form-renta">
        <h2>Solicitar renta</h2>
        <form>
          <label for="fecha-entrega">Fecha de entrega:</label>
          <input type="date" id="fecha-entrega" name="fecha-entrega" required>

          <label for="fecha-recogida">Fecha de recogida:</label>
          <input type="date" id="fecha-recogida" name="fecha-recogida" required>

          <label for="ubicacion">Ubicación de entrega:</label>
          <input type="text" id="ubicacion" name="ubicacion" placeholder="Dirección completa" required>

          <button type="submit" class="btn">Confirmar renta</button>
        </form>
      </div>

      <div class="nav-extra">
        <a href="catalogo.html" class="btn-secondary">Volver al catálogo</a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Toolhouse. Todos los derechos reservados.</p>
  </footer>

  <script src="js/producto.js"></script>

  <script>
document.querySelector(".form-renta form").addEventListener("submit", function(e) {
  e.preventDefault();

  localStorage.setItem("fechaEntrega", document.getElementById("fecha-entrega").value);
  localStorage.setItem("fechaRecogida", document.getElementById("fecha-recogida").value);
  localStorage.setItem("ubicacion", document.getElementById("ubicacion").value);

  window.location.href = "confirmacion.html";
});
</script>

</body>
</html>
