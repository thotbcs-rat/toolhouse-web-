<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del producto</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="logo">TOOLHOUSE</div>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="detalle-producto">
      <h2 id="nombre"></h2>
      <p id="precio"></p>
      <p><strong>Disponibilidad:</strong> 5 unidades</p>
      <p><strong>Condiciones:</strong> La renta debe hacerse con al menos 24 horas de anticipación.</p>
      <p><strong>Seguro:</strong> Incluye servicio de seguro de daños, pérdida y contratiempos ($200).</p>

      <form>
        <label>Fecha de entrega:</label>
        <input type="date" required><br><br>

        <label>Fecha de recogida:</label>
        <input type="date" required><br><br>

        <label>Ubicación de entrega:</label>
        <input type="text" placeholder="Dirección completa" required><br><br>

        <button type="submit" class="btn">Confirmar renta</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Toolhouse. Todos los derechos reservados.</p>
  </footer>

  <script>
    // Leer parámetros de la URL
    const params = new URLSearchParams(window.location.search);
    const nombre = params.get("nombre");
    const precio = params.get("precio");

    // Insertar en el HTML
    if (nombre) document.getElementById("nombre").textContent = nombre;
    if (precio) document.getElementById("precio").textContent = "Precio: " + precio;
  </script>
</body>
</html>
