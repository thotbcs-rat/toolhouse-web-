<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmación de renta</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="logo">TOOLHOUSE</div>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="confirmacion">
      <h2>¡Renta confirmada!</h2>
      <p id="detalle"></p>
      <p id="total"></p>
      <p><strong>Recuerda:</strong> La renta incluye seguro de daños, pérdida y contratiempos ($200).</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Toolhouse. Todos los derechos reservados.</p>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const nombre = params.get("nombre");
    const precio = params.get("precio"); // ejemplo: "$680/día"
    const entrega = params.get("entrega");
    const recogida = params.get("recogida");
    const ubicacion = params.get("ubicacion");

    // Calcular días de renta
    let dias = 1;
    if (entrega && recogida) {
      const fechaEntrega = new Date(entrega);
      const fechaRecogida = new Date(recogida);
      const diff = (fechaRecogida - fechaEntrega) / (1000 * 60 * 60 * 24);
      dias = diff > 0 ? diff : 1;
    }

    // Extraer número del precio (ejemplo "$680/día" → 680)
    let precioNum = 0;
    if (precio) {
      precioNum = parseInt(precio.replace(/[^0-9]/g, ""));
    }

    // Calcular total (precio * días + seguro)
    const seguro = 200;
    const total = (precioNum * dias) + seguro;

    // Mostrar detalles
    document.getElementById("detalle").textContent =
      `Has rentado: ${nombre} por ${dias} día(s). Entrega: ${entrega}, Recogida: ${recogida}, Ubicación: ${ubicacion}.`;

    document.getElementById("total").textContent =
      `Total a pagar: $${total} (incluye seguro de $${seguro}).`;
  </script>
</body>
</html>
